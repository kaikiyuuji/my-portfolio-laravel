name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  test:
    name: Re-run tests on main
    uses: ./.github/workflows/ci.yml

  docker-build:
    name: Build & Push image to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy to Droplet
    runs-on: ubuntu-latest
    needs: docker-build
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_HOST }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DO_DROPLET_IP }}" >> ~/.ssh/known_hosts

      - name: Pull image, migrate, optimize
        env:
          USER: ${{ secrets.DO_DROPLET_USER }}
          IP: ${{ secrets.DO_DROPLET_IP }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh "$USER@$IP" "set -euo pipefail; \
            cd /opt/portfolio && \
            export APP_IMAGE=ghcr.io/${{ env.IMAGE_NAME }}:$IMAGE_TAG && \
            echo \"APP_IMAGE=$APP_IMAGE\" > .env.image && \
            docker compose --env-file .env --env-file .env.image pull app && \
            docker compose --env-file .env --env-file .env.image exec -T mysql \
              sh -c 'mysqldump -uroot -p\$MYSQL_ROOT_PASSWORD \$MYSQL_DATABASE | gzip > /var/lib/mysql/backup-pre-deploy-\$(date +%Y%m%d-%H%M%S).sql.gz' && \
            docker compose --env-file .env --env-file .env.image up -d --no-deps app && \
            docker compose --env-file .env --env-file .env.image exec -T app php artisan migrate --force && \
            docker compose --env-file .env --env-file .env.image exec -T app php artisan config:cache && \
            docker compose --env-file .env --env-file .env.image exec -T app php artisan route:cache && \
            docker compose --env-file .env --env-file .env.image exec -T app php artisan view:cache && \
            docker compose --env-file .env --env-file .env.image up -d --no-deps nginx"

      - name: Smoke test
        env:
          IP: ${{ secrets.DO_DROPLET_IP }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "http://$IP/up" > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed" && exit 1
