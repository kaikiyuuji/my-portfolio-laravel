version: 2

updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - php

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: "/docker/php"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    commit-message:
      prefix: "chore(docker)"
    labels:
      - dependencies
      - docker
