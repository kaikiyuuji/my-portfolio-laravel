# Nginx vhost para o portfolio Laravel.
# root aponta para public/ — Hurdle 3: nunca apontar para /var/www/html.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 12M;

    # Hardening (ver seção 2.4 do PLANEJAMENTO).
    # HSTS: ative SOMENTE após o domínio estar 100% HTTPS (Certbot ativo).
    # Pré-load: adicione "preload" se inscrever em hstspreload.org.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP — libera CDNs de ícones (Simple Icons + Iconify) e Spaces (s3 público).
    # 'unsafe-inline' em style-src é exigido pelo Tailwind/Vite em produção (style attr).
    # Se migrar para nonce, remover 'unsafe-inline'.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https://cdn.simpleicons.org https://api.iconify.design https://*.digitaloceanspaces.com; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; object-src 'none'" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Cache agressivo para assets versionados do Vite.
    location ^~ /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
    }

    # Bloqueia arquivos sensíveis e dotfiles.
    location ~ /\.(?!well-known).* { deny all; }
    location ~* \.(env|log|ini|sql|sh)$ { deny all; }

    error_page 404 /index.php;
}
