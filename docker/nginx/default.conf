# Nginx vhost para o portfolio Laravel (Docker).
# Estrutura: :80 só ACME + redirect → :443 SSL servindo a app.

# ─────────────────────────────────────────────────────────────
# HTTP — somente ACME challenge + redirect 301 para HTTPS
# ─────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name kaikihirata.dev www.kaikihirata.dev;

    # ACME http-01 challenge (renovação Let's Encrypt).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Tudo o mais → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS — app
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kaikihirata.dev www.kaikihirata.dev;

    # Certs Let's Encrypt (montados read-only via docker-compose).
    ssl_certificate     /etc/letsencrypt/live/kaikihirata.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaikihirata.dev/privkey.pem;

    # Mozilla "intermediate" (TLS 1.2 + 1.3).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 12M;

    # Hardening (seção 2.4 do PLANEJAMENTO).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP — trade-offs documentados:
    #   'unsafe-inline' em script-src: Inertia injeta dados via <script> inline em app.blade.php.
    #   'unsafe-eval': Vue 3 reactivity + vue-i18n usam new Function() em runtime.
    #   fonts.bunny.net: CSS + .woff2 servidos pelo provedor (Google Fonts privacy-friendly).
    # Mitigar via nonces exigiria patch no Inertia + Vite — fora de escopo agora.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https://cdn.simpleicons.org https://api.iconify.design https://*.digitaloceanspaces.com; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; script-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data: https://fonts.bunny.net; connect-src 'self'; object-src 'none'" always;

    location = /favicon.ico { access_log off; log_not_found off; try_files $uri =404; }
    location = /robots.txt  { access_log off; log_not_found off; try_files $uri =404; }

    # Cache agressivo para assets versionados do Vite.
    location ^~ /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
    }

    # Bloqueia dotfiles e arquivos sensíveis.
    location ~ /\.(?!well-known).* { deny all; }
    location ~* \.(env|log|ini|sql|sh)$ { deny all; }

    error_page 404 /index.php;
}
