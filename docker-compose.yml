# Compose de produção do portfolio.
# Stack: nginx (frontend) → app (php-fpm) → mysql (volume nomeado).
# Sessões em DB sobrevivem a deploys (Hurdle 2).

name: my-portfolio

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/kaikiyuuji/my-portfolio-laravel:latest}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app_code:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - portfolio
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_code:/var/www/html:ro
      - app_storage:/var/www/html/storage:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - portfolio
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - portfolio
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  app_code:
  app_storage:
  mysql_data:

networks:
  portfolio:
    driver: bridge
